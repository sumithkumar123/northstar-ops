[build]
builder = "DOCKERFILE"
dockerfilePath = "inventory_service/Dockerfile"

[deploy]
startCommand = "sh -c 'alembic -c migrations/alembic.ini upgrade head && uvicorn main:app --host 0.0.0.0 --port $PORT'"
healthcheckPath = "/inventory/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
