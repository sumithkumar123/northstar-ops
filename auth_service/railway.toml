[build]
builder = "DOCKERFILE"
dockerfilePath = "auth_service/Dockerfile"
buildContext = "."

[deploy]
startCommand = "sh -c 'alembic -c migrations/alembic.ini upgrade head && uvicorn main:app --host 0.0.0.0 --port ${PORT:-8001}'"
healthcheckPath = "/auth/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
